services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  monitor:
    build: ./monitor
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - monitor_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/data/server_alert_state.json || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro
      - monitor_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import psycopg2, os; psycopg2.connect(host=os.getenv('POSTGRES_HOST'), dbname=os.getenv('POSTGRES_DB'), user=os.getenv('POSTGRES_USER'), password=os.getenv('POSTGRES_PASSWORD')).close()\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  monitor_data:
